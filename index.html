<!DOCTYPE html>
<html>

<title>My Games</title>
<style>
body { text-align: center; background:#eee; font-family: Arial; }

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
  gap: 20px;
  padding: 40px;
}

.card {
  display: block;
  padding: 40px;
  background: white;
  border-radius: 12px;
  text-decoration: none;
  color: #333;
}
</style>
</head>
<body>

<h1>🎮 My Games</h1>

</div>
